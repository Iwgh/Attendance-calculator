<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출결 계산기</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --card: #1f2937;
      --line: #374151;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --danger: #f87171;
      --warn: #fbbf24;
      --ok: #34d399;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #0a0f1c 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .card {
      background: rgba(31, 41, 55, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 700;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 14px;
      color: #d1d5db;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid var(--line);
    }

    .results {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .result-box {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }

    .result-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 24px;
      font-weight: 800;
      word-break: break-word;
    }

    .status {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 14px;
      border: 1px solid transparent;
    }

    .status.ok { background: rgba(52, 211, 153, 0.08); color: #d1fae5; border-color: rgba(52,211,153,0.22); }
    .status.warn { background: rgba(251, 191, 36, 0.08); color: #fef3c7; border-color: rgba(251,191,36,0.22); }
    .status.danger { background: rgba(248, 113, 113, 0.08); color: #fee2e2; border-color: rgba(248,113,113,0.22); }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      .grid, .fields, .inline-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>출결 계산기</h1>
    <div class="sub">
      단기과정은 시간 기준, 장기과정은 일수 기준으로 계산한다.<br>
      결과는 출석률과 수료 가능 여부만 간단하게 보여준다.
    </div>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">입력</h2>
        <div class="fields">
          <div class="field full">
            <label for="courseType">과정 구분</label>
            <select id="courseType">
              <option value="shortCourse">단기과정 (시간 기준)</option>
              <option value="longCourse">장기과정 (일수 기준)</option>
            </select>
          </div>

          <div class="field full">
            <label for="attendanceMode">출석 계산 유형</label>
            <select id="attendanceMode">
              <option value="over40">40일 이상</option>
              <option value="under40">40일 미만</option>
              <option value="transfer">중간편입</option>
            </select>
          </div>

          <div class="field full">
            <label for="totalTrainingHours">총 훈련시간</label>
            <input id="totalTrainingHours" type="number" min="0" step="0.01" value="0" />
            <div class="hint">전체 과정의 총 훈련시간</div>
          </div>

          <div class="field full" id="totalTrainingDaysField" style="display:none;">
            <label for="totalTrainingDays">총 훈련일수</label>
            <input id="totalTrainingDays" type="number" min="0" step="1" value="0" />
            <div class="hint">장기과정일 때 사용</div>
          </div>

          <div class="field full" id="excludedHoursField" style="display:none;">
            <label for="excludedHours">제외시간 C</label>
            <input id="excludedHours" type="number" min="0" step="0.01" value="0" />
            <div class="hint">중간편입일 때만 사용</div>
          </div>

          <div class="field full">
            <label>현재 결석시간</label>
            <div class="inline-grid">
              <input id="absenceHours" type="number" min="0" step="1" value="0" placeholder="시간" />
              <input id="absenceMinutes" type="number" min="0" max="59" step="1" value="0" placeholder="분" />
            </div>
            <div class="hint">결석한 총 시간을 시간/분으로 입력</div>
          </div>

          <div class="field full">
            <label for="absenceUnitHours">결석 1회당 시간</label>
            <input id="absenceUnitHours" type="number" min="0" step="0.01" value="8" />
            <div class="hint">장기과정에서 결석시간을 결석일수로 환산할 때 사용</div>
          </div>

          <div class="field full">
            <label for="warningThreshold">경고 기준 출석률(%)</label>
            <input id="warningThreshold" type="number" min="0" max="100" step="0.01" value="80" />
            <div class="hint">기본값 80%</div>
          </div>
        </div>

        <div class="buttons">
          <button class="primary" id="calcBtn">계산하기</button>
          <button class="secondary" id="resetBtn">초기화</button>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">결과</h2>
        <div class="results">
          <div class="result-box">
            <div class="result-label">출석률</div>
            <div class="result-value" id="attendanceRate">-</div>
          </div>
          <div class="result-box">
            <div class="result-label">수료 가능 여부</div>
            <div class="result-value" id="completionResult">-</div>
          </div>
        </div>

        <div id="statusBox" class="status warn">값을 입력하고 계산하기를 누르면 결과가 나온다.</div>
        <div class="footer-note">
          단기과정은 총 훈련시간 대비 결석시간으로 계산하고, 장기과정은 결석시간을 결석일수로 환산해서 계산한다.
        </div>
      </section>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const els = {
      courseType: $("courseType"),
      attendanceMode: $("attendanceMode"),
      totalTrainingHours: $("totalTrainingHours"),
      totalTrainingDays: $("totalTrainingDays"),
      totalTrainingDaysField: $("totalTrainingDaysField"),
      excludedHours: $("excludedHours"),
      excludedHoursField: $("excludedHoursField"),
      absenceHours: $("absenceHours"),
      absenceMinutes: $("absenceMinutes"),
      absenceUnitHours: $("absenceUnitHours"),
      warningThreshold: $("warningThreshold"),
      attendanceRate: $("attendanceRate"),
      completionResult: $("completionResult"),
      statusBox: $("statusBox"),
      calcBtn: $("calcBtn"),
      resetBtn: $("resetBtn"),
    };

    function num(value) {
      const n = parseFloat(value);
      return Number.isFinite(n) ? n : 0;
    }

    function round2(value) {
      return Math.round((value + Number.EPSILON) * 100) / 100;
    }

    function formatNum(value) {
      return round2(value).toLocaleString("ko-KR", { maximumFractionDigits: 2, minimumFractionDigits: 0 });
    }

    function setStatus(type, text) {
      els.statusBox.className = `status ${type}`;
      els.statusBox.textContent = text;
    }

    function updateVisibleFields() {
      const courseType = els.courseType.value;
      const attendanceMode = els.attendanceMode.value;

      els.totalTrainingDaysField.style.display = courseType === "longCourse" ? "block" : "none";
      els.excludedHoursField.style.display = attendanceMode === "transfer" ? "block" : "none";
    }

    function calculate() {
      const courseType = els.courseType.value;
      const attendanceMode = els.attendanceMode.value;
      const totalHours = num(els.totalTrainingHours.value);
      const totalDays = Math.floor(num(els.totalTrainingDays.value));
      const excludedHours = num(els.excludedHours.value);
      const absenceHours = Math.max(0, Math.floor(num(els.absenceHours.value)));
      const absenceMinutes = Math.max(0, Math.floor(num(els.absenceMinutes.value)));
      const absenceUnitHours = num(els.absenceUnitHours.value);
      const warningThreshold = num(els.warningThreshold.value);

      const totalAbsenceHours = round2(absenceHours + (absenceMinutes / 60));
      let attendanceRate = 0;
      let isCompletable = false;

      if (courseType === "shortCourse") {
        let denominator = totalHours;
        if (attendanceMode === "transfer") {
          denominator = totalHours - excludedHours;
        }

        if (denominator <= 0) {
          els.attendanceRate.textContent = "-";
          els.completionResult.textContent = "계산 불가";
          setStatus("danger", "총 훈련시간 또는 제외시간 값을 다시 확인해야 한다.");
          return;
        }

        const attendedHours = Math.max(0, denominator - totalAbsenceHours);
        attendanceRate = round2((attendedHours / denominator) * 100);
      } else {
        if (totalDays <= 0 || absenceUnitHours <= 0) {
          els.attendanceRate.textContent = "-";
          els.completionResult.textContent = "계산 불가";
          setStatus("danger", "장기과정은 총 훈련일수와 결석 1회당 시간을 0보다 크게 넣어야 한다.");
          return;
        }

        const absenceDays = totalAbsenceHours / absenceUnitHours;
        const attendedDays = Math.max(0, totalDays - absenceDays);
        attendanceRate = round2((attendedDays / totalDays) * 100);
      }

      isCompletable = attendanceRate >= warningThreshold;

      els.attendanceRate.textContent = `${formatNum(attendanceRate)}%`;
      els.completionResult.textContent = isCompletable ? "수료 가능" : "수료 불가";

      if (attendanceRate < warningThreshold) {
        setStatus("danger", `현재 출석률은 ${formatNum(attendanceRate)}%다. 기준 ${formatNum(warningThreshold)}% 미만이라 수료 불가로 표시했다.`);
      } else if (attendanceRate < warningThreshold + 5) {
        setStatus("warn", `현재 출석률은 ${formatNum(attendanceRate)}%다. 기준은 넘었지만 여유가 크지 않다.`);
      } else {
        setStatus("ok", `현재 출석률은 ${formatNum(attendanceRate)}%다. 기준 ${formatNum(warningThreshold)}% 이상이라 수료 가능으로 표시했다.`);
      }
    }

    function resetForm() {
      els.courseType.value = "shortCourse";
      els.attendanceMode.value = "over40";
      els.totalTrainingHours.value = 0;
      els.totalTrainingDays.value = 0;
      els.excludedHours.value = 0;
      els.absenceHours.value = 0;
      els.absenceMinutes.value = 0;
      els.absenceUnitHours.value = 8;
      els.warningThreshold.value = 80;
      els.attendanceRate.textContent = "-";
      els.completionResult.textContent = "-";
      updateVisibleFields();
      setStatus("warn", "값을 입력하고 계산하기를 누르면 결과가 나온다.");
    }

    els.courseType.addEventListener("change", updateVisibleFields);
    els.attendanceMode.addEventListener("change", updateVisibleFields);
    els.calcBtn.addEventListener("click", calculate);
    els.resetBtn.addEventListener("click", resetForm);

    updateVisibleFields();
  </script>
</body>
</html>
